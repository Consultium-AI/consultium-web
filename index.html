    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Handle redirect from 404.html for GitHub Pages SPA
      (function(l) {
        if (l.search[1] === '/') {
          // l.search is like '?/summary' - extract the path
          var path = l.search.slice(2).split('&')[0].replace(/~and~/g, '&');
          var query = l.search.slice(2).split('&').slice(1).join('&');
          window.history.replaceState(null, null,
            '/' + path + (query ? '?' + query.replace(/~and~/g, '&') : '') + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      // Default to light mode unless the user explicitly saved dark mode.
      (function () {
        var key = 'smartium-theme'
        var stored = localStorage.getItem(key)
        if (stored === 'dark') {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>
